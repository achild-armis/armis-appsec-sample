name: Armis Security Scan

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Armis CLI
        run: |
          curl -sSL https://raw.githubusercontent.com/ArmisSecurity/armis-cli/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Armis CLI scan
        id: armis-scan
        env:
          ARMIS_API_TOKEN: ${{ secrets.ARMIS_API_TOKEN }}
        run: |
          set +e
          ~/.local/bin/armis-cli scan repo . \
            --tenant-id "${{ secrets.ARMIS_TENANT_ID }}" \
            --format sarif \
            --fail-on HIGH \
            --sbom \
            --vex \
            --sbom-output sbom.cdx.json \
            --vex-output vex.cdx.json \
            > armis-results.sarif
          SCAN_EXIT_CODE=$?
          echo "exit-code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $SCAN_EXIT_CODE

      - name: Check SARIF file
        id: check-sarif
        if: always()
        run: |
          if [ -s armis-results.sarif ] && jq empty armis-results.sarif 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "SARIF file is empty or invalid, skipping upload"
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check-sarif.outputs.valid == 'true'
        with:
          sarif_file: armis-results.sarif
          category: armis-security

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore

      - name: Upload VEX artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vex
          path: vex.cdx.json
          if-no-files-found: ignore

      - name: Save artifacts to repo
        if: always() && steps.check-sarif.outputs.valid == 'true' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .security
          [ -f sbom.cdx.json ] && cp sbom.cdx.json .security/
          [ -f vex.cdx.json ] && cp vex.cdx.json .security/

      - name: Commit artifacts
        if: always() && steps.check-sarif.outputs.valid == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .security/
          git diff --staged --quiet || git commit -m "Update SBOM and VEX [skip ci]"
          git push || echo "Nothing to push"
