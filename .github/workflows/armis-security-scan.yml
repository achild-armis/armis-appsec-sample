name: Armis Security Scan

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to scan (leave empty to use current ref)"
        required: false
        type: string

permissions:
  contents: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install Armis CLI
        run: |
          # Extract to temp directory to avoid overwriting repo files
          TMP_DIR=$(mktemp -d)
          curl -fsSL https://github.com/ArmisSecurity/armis-cli/releases/latest/download/armis-cli-linux-amd64.tar.gz | tar -xz -C "$TMP_DIR"
          sudo mv "$TMP_DIR/armis-cli" /usr/local/bin/
          rm -rf "$TMP_DIR"
          armis-cli --version

      - name: Run Armis CLI scan with SBOM and VEX
        id: armis-scan
        env:
          ARMIS_API_TOKEN: ${{ secrets.ARMIS_API_TOKEN }}
        run: |
          set +e
          armis-cli scan repo . \
            --tenant-id "${{ secrets.ARMIS_TENANT_ID }}" \
            --format sarif \
            --fail-on HIGH \
            --sbom \
            --vex \
            --sbom-output sbom.cdx.json \
            --vex-output vex.cdx.json \
            > armis-results.sarif
          SCAN_EXIT_CODE=$?
          echo "exit-code=$SCAN_EXIT_CODE" >> $GITHUB_OUTPUT
          exit $SCAN_EXIT_CODE

      - name: Check SARIF file
        id: check-sarif
        if: always()
        run: |
          if [ -s armis-results.sarif ] && jq empty armis-results.sarif 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "SARIF file is empty or invalid, skipping upload"
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check-sarif.outputs.valid == 'true'
        with:
          sarif_file: armis-results.sarif
          category: armis-security

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore

      - name: Upload VEX artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vex
          path: vex.cdx.json
          if-no-files-found: ignore

      - name: Upload scan results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: armis-results.sarif
          if-no-files-found: ignore

      - name: Update README with scan summary
        if: always() && steps.check-sarif.outputs.valid == 'true' && github.ref == 'refs/heads/main'
        run: |
          # Parse SARIF for vulnerability counts
          CRITICAL=$(jq '[.runs[].results[] | select(.level == "error" and (.properties.severity == "critical" or .properties.severity == "CRITICAL"))] | length' armis-results.sarif 2>/dev/null || echo "0")
          HIGH=$(jq '[.runs[].results[] | select(.level == "error" and (.properties.severity == "high" or .properties.severity == "HIGH"))] | length' armis-results.sarif 2>/dev/null || echo "0")
          MEDIUM=$(jq '[.runs[].results[] | select(.level == "warning")] | length' armis-results.sarif 2>/dev/null || echo "0")
          LOW=$(jq '[.runs[].results[] | select(.level == "note")] | length' armis-results.sarif 2>/dev/null || echo "0")

          # Get total if severity-based counts are all 0
          if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ] && [ "$MEDIUM" = "0" ] && [ "$LOW" = "0" ]; then
            TOTAL=$(jq '[.runs[].results[]] | length' armis-results.sarif 2>/dev/null || echo "0")
            HIGH=$TOTAL
          fi

          SCAN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Update README
          sed -i.bak '/<!-- SECURITY-SUMMARY-START -->/,/<!-- SECURITY-SUMMARY-END -->/c\
          <!-- SECURITY-SUMMARY-START -->\
          | Severity | Count |\
          |----------|-------|\
          | Critical | '"$CRITICAL"' |\
          | High | '"$HIGH"' |\
          | Medium | '"$MEDIUM"' |\
          | Low | '"$LOW"' |\
          \
          *Last scan: '"$SCAN_DATE"'*\
          <!-- SECURITY-SUMMARY-END -->' README.md
          rm -f README.md.bak

      - name: Save security artifacts to repo
        if: always() && steps.check-sarif.outputs.valid == 'true' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .security
          [ -f sbom.cdx.json ] && cp sbom.cdx.json .security/
          [ -f vex.cdx.json ] && cp vex.cdx.json .security/
          [ -f armis-results.sarif ] && cp armis-results.sarif .security/scan-results.sarif

      - name: Commit security artifacts and README
        if: always() && steps.check-sarif.outputs.valid == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .security/
          git diff --staged --quiet || git commit -m "Update security scan results [skip ci]"
          git push || echo "Nothing to push"
