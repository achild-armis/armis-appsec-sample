name: Armis Security Scan

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Armis CLI scan
        id: armis-scan
        uses: ArmisSecurity/armis-cli@main
        with:
          scan-type: repo
          api-token: ${{ secrets.ARMIS_API_TOKEN }}
          tenant-id: ${{ secrets.ARMIS_TENANT_ID }}
          fail-on: HIGH
          output-file: armis-results.sarif

      - name: Generate SBOM and VEX
        if: always()
        env:
          ARMIS_API_TOKEN: ${{ secrets.ARMIS_API_TOKEN }}
        run: |
          # CLI was installed by the action to ~/.local/bin
          ~/.local/bin/armis-cli scan repo . \
            --tenant-id "${{ secrets.ARMIS_TENANT_ID }}" \
            --format sarif \
            --sbom \
            --vex \
            --sbom-output sbom.cdx.json \
            --vex-output vex.cdx.json \
            > /dev/null 2>&1 || true

      - name: Check SARIF file
        id: check-sarif
        if: always()
        run: |
          if [ -s armis-results.sarif ] && jq empty armis-results.sarif 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.check-sarif.outputs.valid == 'true'
        with:
          sarif_file: armis-results.sarif
          category: armis-security

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.cdx.json
          if-no-files-found: ignore

      - name: Upload VEX artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vex
          path: vex.cdx.json
          if-no-files-found: ignore

      - name: Save artifacts to repo
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .security
          [ -f sbom.cdx.json ] && cp sbom.cdx.json .security/
          [ -f vex.cdx.json ] && cp vex.cdx.json .security/

      - name: Commit artifacts
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .security/
          git diff --staged --quiet || git commit -m "Update SBOM and VEX [skip ci]"
          git push || true
